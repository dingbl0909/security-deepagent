app:
  name: security-deepagent-practice
  environment: local
  default_user_id: ops_001

agent:
  llm_enabled: false
  top_k: 4
  require_human_review_levels:
    - high
    - critical

storage:
  db_path: data/db/security_agent.sqlite3
  knowledge_dir: data/knowledge
  log_dir: data/logs
  memory_dir: data/memory
  workspace_dir: data/workspace

sandbox:
  provider: local
  backend: filesystem
  allow_shell: false
  shell_timeout_seconds: 30
  max_output_bytes: 50000
  opensandbox:
    domain:
    image:
    sandbox_id:

